
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Bebas+Neue&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  #app { font-family: 'Nunito', sans-serif; background: var(--color-background-tertiary); min-height: 100vh; }

  .hero {
    background: linear-gradient(135deg, #1e3a5f 0%, #0f2240 100%);
    padding: 2rem 1.5rem 1.6rem;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .hero::before { content:''; position:absolute; top:-50px; left:-50px; width:220px; height:220px; background:radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%); border-radius:50%; }
  .hero::after  { content:''; position:absolute; bottom:-40px; right:-30px; width:180px; height:180px; background:radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 70%); border-radius:50%; }
  .hero-title { font-family:'Bebas Neue',sans-serif; font-size:clamp(28px,6vw,48px); letter-spacing:3px; color:#fff; line-height:1.1; position:relative; z-index:1; }
  .hero-title span { color:#60a5fa; }
  .hero-sub { font-size:13px; color:rgba(255,255,255,0.6); margin-top:6px; position:relative; z-index:1; }
  .hero-tags { display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:10px; position:relative; z-index:1; }
  .hero-tag { font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.8); }

  .layout { display:grid; grid-template-columns:1fr; }
  @media(min-width:860px){ .layout { grid-template-columns:380px 1fr; } }

  .form-panel {
    background: var(--color-background-primary);
    border-right: 0.5px solid var(--color-border-tertiary);
    padding: 1.5rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .sec-label { font-size:10px; font-weight:900; letter-spacing:2px; text-transform:uppercase; color:var(--color-text-tertiary); }
  .field { display:flex; flex-direction:column; gap:4px; }
  .flabel { font-size:13px; font-weight:700; color:var(--color-text-secondary); }
  .fhint  { font-size:11px; color:var(--color-text-tertiary); }

  input[type=text], select {
    width:100%; padding:8px 12px;
    border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md);
    font-family:'Nunito',sans-serif; font-size:14px;
    background:var(--color-background-secondary);
    color:var(--color-text-primary);
    outline:none; transition:border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus, select:focus { border-color:#3b82f6; box-shadow:0 0 0 2px rgba(59,130,246,.15); }

  .two-col { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

  .pills { display:flex; gap:6px; flex-wrap:wrap; }
  .pill {
    padding:6px 14px; border-radius:20px;
    border:1.5px solid var(--color-border-secondary);
    cursor:pointer; font-size:13px; font-weight:700;
    color:var(--color-text-secondary);
    background:var(--color-background-secondary);
    transition:all .15s; user-select:none;
  }
  .pill.active { border-color:#3b82f6; background:rgba(59,130,246,.1); color:#3b82f6; }

  .swatches { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
  .swatch {
    aspect-ratio:1; border-radius:10px; cursor:pointer;
    border:3px solid transparent; transition:all .15s;
    display:flex; align-items:center; justify-content:center;
    font-size:14px; color:white; font-weight:900;
    text-shadow:0 1px 3px rgba(0,0,0,.4);
  }
  .swatch.active { border-color:#1e3a5f; transform:scale(1.18); box-shadow:0 4px 12px rgba(0,0,0,.2); }

  .gen-btn {
    width:100%; padding:14px;
    background:#1e3a5f; color:#fff; border:none;
    border-radius:var(--border-radius-lg);
    font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px;
    cursor:pointer; transition:all .2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .gen-btn:hover:not(:disabled) { background:#2a4f82; transform:translateY(-1px); }
  .gen-btn:disabled { opacity:.55; cursor:not-allowed; }

  .result-panel {
    background:var(--color-background-secondary);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:2rem 1.5rem; min-height:480px;
  }
  .empty { text-align:center; opacity:.4; }
  .empty-icon { font-size:64px; display:block; margin-bottom:12px; }
  .empty-text { font-size:14px; color:var(--color-text-secondary); line-height:1.7; font-weight:700; }

  .spinner-wrap { text-align:center; }
  .spinner {
    width:56px; height:56px;
    border:4px solid var(--color-border-tertiary);
    border-top-color:#3b82f6;
    border-radius:50%;
    animation:spin .85s linear infinite;
    margin:0 auto 14px;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spin-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; color:var(--color-text-primary); }
  .spin-sub   { font-size:12px; color:var(--color-text-tertiary); margin-top:4px; line-height:1.6; }

  .fig-card {
    background:var(--color-background-primary);
    border-radius:20px; border:0.5px solid var(--color-border-secondary);
    overflow:hidden; max-width:360px; width:100%;
    box-shadow:0 8px 40px rgba(0,0,0,.1);
    animation:fadeUp .4s cubic-bezier(.22,1,.36,1);
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
  .fig-img { width:100%; aspect-ratio:4/5; overflow:hidden; background:var(--color-background-secondary); }
  .fig-img img { width:100%; height:100%; object-fit:cover; display:block; }
  .fig-foot { padding:16px 20px 18px; border-top:0.5px solid var(--color-border-tertiary); }
  .fig-name { font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:1px; color:var(--color-text-primary); line-height:1; }
  .fig-meta { display:flex; align-items:center; gap:8px; margin-top:6px; }
  .mbti-badge { padding:3px 10px; border-radius:20px; font-size:12px; font-weight:900; letter-spacing:1px; background:rgba(59,130,246,.1); color:#2563eb; }
  .vibe-tag   { font-size:12px; color:var(--color-text-tertiary); font-weight:700; }
  .actions { display:flex; gap:8px; margin-top:12px; }
  .act-btn {
    flex:1; padding:8px 10px;
    background:var(--color-background-secondary);
    border:0.5px solid var(--color-border-secondary);
    border-radius:var(--border-radius-md);
    font-family:'Nunito',sans-serif; font-size:13px; font-weight:700;
    color:var(--color-text-secondary); cursor:pointer;
    transition:all .15s; text-align:center; text-decoration:none;
    display:flex; align-items:center; justify-content:center; gap:4px;
  }
  .act-btn:hover { background:var(--color-background-tertiary); }

  .err { background:rgba(220,38,38,.06); border:0.5px solid rgba(220,38,38,.3); border-radius:var(--border-radius-md); padding:10px 14px; font-size:13px; color:#dc2626; font-weight:700; }
</style>

<div id="app">
  <div class="hero">
    <div class="hero-title">MY <span>FIGURE</span> BOX</div>
    <div class="hero-sub">세상에 하나뿐인 나만의 3D 피규어로 친구들에게 나를 소개하세요</div>
    <div class="hero-tags">
      <span class="hero-tag">첫 수업 자기소개</span>
      <span class="hero-tag">3D 피규어</span>
      <span class="hero-tag">Pop Mart Style</span>
    </div>
  </div>

  <div class="layout">
    <div class="form-panel">
      <div class="sec-label">나의 정보 입력</div>

      <div class="field">
        <div class="flabel">이름 / 닉네임</div>
        <div class="fhint">영문으로 입력하면 박스 글씨가 더 예쁘게 나와요</div>
        <input type="text" id="name" placeholder="예: jihoon, minjung" />
      </div>

      <div class="field">
        <div class="flabel">성별</div>
        <div class="pills" id="gender-group">
          <div class="pill active" data-val="여학생">여학생</div>
          <div class="pill" data-val="남학생">남학생</div>
          <div class="pill" data-val="선택 안함">선택 안함</div>
        </div>
      </div>

      <div class="two-col">
        <div class="field">
          <div class="flabel">MBTI</div>
          <select id="mbti">
            <option>ISTJ</option><option>ISFJ</option><option>INFJ</option><option>INTJ</option>
            <option>ISTP</option><option>ISFP</option><option>INFP</option><option>INTP</option>
            <option>ESTP</option><option>ESFP</option><option selected>ENFP</option><option>ENTP</option>
            <option>ESTJ</option><option>ESFJ</option><option>ENFJ</option><option>ENTJ</option>
          </select>
        </div>
        <div class="field">
          <div class="flabel">분위기</div>
          <select id="vibe">
            <option>활발하고 귀여운</option><option>차분하고 지적인</option>
            <option>힙하고 스트릿한</option><option>다정하고 따뜻한</option>
            <option>시크하고 도도한</option><option>엉뚱하고 발랄한</option>
            <option>열정적이고 에너지 넘치는</option><option>느긋하고 여유로운</option>
            <option>장난기 많은</option><option>조용하고 진지한</option>
          </select>
        </div>
      </div>

      <div class="field">
        <div class="flabel">헤어스타일</div>
        <input type="text" id="hair" placeholder="예: 검은 짧은 머리, 긴 웨이브" value="짧은 머리" />
      </div>

      <div class="field">
        <div class="flabel">옷 스타일</div>
        <input type="text" id="clothes" placeholder="예: 교복, 검정 후드티" value="캐주얼한 학생복" />
      </div>

      <div class="field">
        <div class="flabel">나를 표현하는 소품 2~3개</div>
        <div class="fhint">박스 안에 함께 들어갈 아이템 (취미, 관심사)</div>
        <input type="text" id="accessories" placeholder="예: 축구공, 게임기, 카메라" value="스마트폰, 백팩" />
      </div>

      <div class="field">
        <div class="flabel">패키지 박스 색상</div>
        <div class="swatches" id="color-grid">
          <div class="swatch active" style="background:#2dd4bf" data-val="Mint Green" title="민트">✓</div>
          <div class="swatch" style="background:#fb7185" data-val="Coral Pink" title="코랄">✓</div>
          <div class="swatch" style="background:#d97706" data-val="Cardboard Box" title="크래프트">✓</div>
          <div class="swatch" style="background:#38bdf8" data-val="Sky Blue" title="스카이블루">✓</div>
          <div class="swatch" style="background:#a78bfa" data-val="Lavender" title="라벤더">✓</div>
          <div class="swatch" style="background:#1e293b" data-val="Dark Black" title="블랙">✓</div>
        </div>
      </div>

      <div id="err-area"></div>

      <button class="gen-btn" id="gen-btn" onclick="generate()">
        <span id="btn-icon">✦</span>
        <span id="btn-text">피규어 생성하기</span>
      </button>
    </div>

    <div class="result-panel" id="result">
      <div class="empty">
        <span class="empty-icon">📦</span>
        <div class="empty-text">왼쪽 폼을 작성하고<br/>피규어를 생성해보세요!</div>
      </div>
    </div>
  </div>
</div>

<script>
const API_KEY = "AIzaSyCtHMxxyOlvKlwE-EC9jRnxGdszSRf67SU";
let boxColor = "Mint Green", gender = "여학생";

document.querySelectorAll('#gender-group .pill').forEach(p => {
  p.onclick = () => {
    document.querySelectorAll('#gender-group .pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active'); gender = p.dataset.val;
  };
});

document.querySelectorAll('#color-grid .swatch').forEach(s => {
  s.onclick = () => {
    document.querySelectorAll('#color-grid .swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active'); boxColor = s.dataset.val;
  };
});

function setErr(msg) {
  document.getElementById('err-area').innerHTML = msg ? `<div class="err">${msg}</div>` : '';
}

function showEmpty() {
  document.getElementById('result').innerHTML = `<div class="empty"><span class="empty-icon">📦</span><div class="empty-text">왼쪽 폼을 작성하고<br/>피규어를 생성해보세요!</div></div>`;
}

async function generate() {
  const name = document.getElementById('name').value.trim();
  const mbti = document.getElementById('mbti').value;
  const vibe = document.getElementById('vibe').value;
  const hair = document.getElementById('hair').value.trim();
  const clothes = document.getElementById('clothes').value.trim();
  const accessories = document.getElementById('accessories').value.trim();

  setErr('');
  if (!name) { setErr('이름 또는 닉네임을 입력해주세요!'); return; }

  const gMap = { '여학생':'female student','남학생':'male student','선택 안함':'student' };
  const prompt = `A 3D rendered blind box collectible figure toy inside a packaging box, high quality, 8k resolution, pop-mart style, octane render, soft studio lighting.
The packaging box color is ${boxColor}.
The main character is a ${gMap[gender]} with a ${vibe} vibe, wearing ${clothes}, and having ${hair}.
Arranged neatly around the character inside the box are 3D miniature accessories: ${accessories}.
Typography: 1. Print "@${name}" prominently on top of the box. 2. Print "${mbti}" at the bottom. 3. NO random text, NO gibberish, NO Chinese or Korean characters. Only the exact English text.
The figure looks friendly and approachable.`;

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('btn-icon').textContent = '⟳';
  document.getElementById('btn-text').textContent = '피규어 제작 중...';
  document.getElementById('result').innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><div class="spin-title">공장 가동 중</div><div class="spin-sub">MBTI 스티커 붙이는 중...<br/>약 15초 소요됩니다</div></div>`;

  try {
    const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${API_KEY}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ instances:{ prompt }, parameters:{ sampleCount:1 } })
    });
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    if (!data.predictions?.[0]?.bytesBase64Encoded) throw new Error('no image');

    const src = `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
    document.getElementById('result').innerHTML = `
      <div class="fig-card">
        <div class="fig-img"><img src="${src}" alt="figure" /></div>
        <div class="fig-foot">
          <div class="fig-name">${name}</div>
          <div class="fig-meta">
            <span class="mbti-badge">${mbti}</span>
            <span class="vibe-tag">${vibe}</span>
          </div>
          <div class="actions">
            <a class="act-btn" href="${src}" download="figure_${name}.png">⬇ 다운로드</a>
            <button class="act-btn" onclick="showEmpty()">↺ 다시 만들기</button>
          </div>
        </div>
      </div>`;
  } catch(e) {
    setErr('이미지 생성 중 문제가 발생했어요. 잠시 후 다시 시도해주세요.');
    showEmpty();
  } finally {
    btn.disabled = false;
    document.getElementById('btn-icon').textContent = '✦';
    document.getElementById('btn-text').textContent = '피규어 생성하기';
  }
}
</script>
